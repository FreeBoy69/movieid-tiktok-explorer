name: Deploy AutoYT to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: autoyt-vps-deploy
  cancel-in-progress: true

env:
  VPS_HOST: ${{ secrets.VPS_HOST || '212.95.34.95' }}
  VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
  VPS_USER: ${{ secrets.VPS_USER || 'root' }}
  VPS_APP_DIR: ${{ secrets.VPS_APP_DIR || '/opt/autoyt/app' }}
  VPS_SERVICE_NAME: ${{ secrets.VPS_SERVICE_NAME || 'autoyt' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint -- --pretty false

      - name: Package release
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='tmp' \
            --exclude='*.tar.gz' \
            --exclude='*.tgz' \
            --exclude='test_tiktok.mp4.part' \
            -czf /tmp/autoyt-release.tgz .

      - name: Validate deploy secrets
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::Missing repository secret VPS_SSH_KEY."
            echo "Add it under Settings -> Secrets and variables -> Actions."
            echo "Use the private key that can SSH to ${VPS_HOST} as ${VPS_USER} (for example ~/.ssh/id_ed25519)."
            exit 1
          fi

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS host key
        run: ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        run: scp -P "$VPS_PORT" /tmp/autoyt-release.tgz "$VPS_USER@$VPS_HOST:/tmp/autoyt-release.tgz"

      - name: Deploy on VPS
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "APP_DIR='$VPS_APP_DIR' SERVICE_NAME='$VPS_SERVICE_NAME' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$APP_DIR"
          if [ -f .env ]; then cp .env /tmp/autoyt-env-backup; fi
          if [ -f .env.local ]; then cp .env.local /tmp/autoyt-env-local-backup; fi
          tar -xzf /tmp/autoyt-release.tgz -C "$APP_DIR"
          if [ -f /tmp/autoyt-env-backup ]; then cp /tmp/autoyt-env-backup .env; fi
          if [ -f /tmp/autoyt-env-local-backup ]; then cp /tmp/autoyt-env-local-backup .env.local; fi
          npm ci
          npm run build
          npm prune --omit=dev
          if [ -x .venv/bin/python ]; then
            .venv/bin/python -m pip install --disable-pip-version-check --upgrade yt-dlp
          fi
          node --check server.js
          systemctl restart "$SERVICE_NAME"
          sleep 3
          systemctl is-active "$SERVICE_NAME"
          REMOTE
